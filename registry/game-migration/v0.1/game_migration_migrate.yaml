id: game_migration_migrate
name: Game Migration Migrate
description: Execute a migration batch on the target Rust framework while preserving semantic parity.
category: execution
incremental_rules:
  - Confirm batch scope from the migration map before changing code.
  - Resolve required core-gap and framework-gap patches before game-layer implementation.
  - Extract content into fixtures and map source concepts to framework types.
  - Implement game-specific behavior only in the game crate, not in shared framework crates.
  - Write parity tests with canonical input states and strict trace assertions.
  - Run cargo check, cargo test, cargo clippy, and batch-specific parity gates before closing the batch.
  - Update migration artifacts and changelog entries after each completed batch.
dependencies:
  - game_migration_core
  - game_migration_plan